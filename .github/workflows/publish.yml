# Publish to npm from the PUBLIC GitHub mirror. Triggered by the version tag that GitLab CI pushes here.
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN is stored anywhere — and records a provenance
# attestation. The publish job runs in the `npm-publish` environment, which is configured with required
# reviewers, so a release pauses for human approval before it can publish.
name: Publish to npm

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write          # required for Trusted Publishing (OIDC) + provenance signing

jobs:
  publish:
    if: github.repository == 'zappar-xr/zapbox-controller-web'   # never attempt to run in a fork
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest        # Trusted Publishing OIDC needs npm >= 11.5.1
      - run: npm ci
      - run: npm run typecheck
      - name: Verify tag matches package.json version
        run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"
      - run: npm publish --provenance   # OIDC auth via Trusted Publishing; access:public comes from publishConfig
